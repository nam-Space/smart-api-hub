services:
  # 1. Dịch vụ Database
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Đã xóa phần networks để dùng mạng mặc định của Docker Compose

  # 2. Dịch vụ Node.js App
  app:
    build: .
    container_name: node_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      # QUAN TRỌNG: Đổi localhost thành db (tên service ở trên)
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: postgres_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: this_is_my_scret
      TOKEN_EXPIRATION: 1d # Sửa dấu = thành dấu :
    depends_on:
      - db

volumes:
  postgres_data:
